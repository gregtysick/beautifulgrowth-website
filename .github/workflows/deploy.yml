name: Deploy BeautifulGrowth to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync site files to cPanel
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -az
          path: ./
          remote_host: ${{ secrets.CPANEL_HOST }}
          remote_user: ${{ secrets.CPANEL_USER }}
          remote_port: ${{ secrets.CPANEL_PORT }}
          remote_path: ${{ secrets.CPANEL_DOCROOT }}
          remote_key: ${{ secrets.CPANEL_SSH_KEY }}
